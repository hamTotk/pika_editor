<!doctype html>
<html lang="ja" data-theme="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pika</title>
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./styles/app.css" />
  </head>
  <body>
    <!-- ファイルタイプアイコンの SVG symbol スプライト（ui-design 6章・案A=モノトーン線）。
         lucide(MIT) 風の path をモック（docs/ui-mock.html G節）から正確に写す。色は currentColor
         でテーマ追従し、状態色（青/緑/赤）と干渉させない。視覚にも読み上げにも出さない不可視定義。 -->
    <svg
      aria-hidden="true"
      style="position: absolute; width: 0; height: 0; overflow: hidden"
    >
      <defs>
        <symbol id="ic-folder" viewBox="0 0 24 24">
          <path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z" />
        </symbol>
        <symbol id="ic-code" viewBox="0 0 24 24">
          <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
          <path d="M14 2v4a2 2 0 0 0 2 2h4" />
          <path d="m10 13-2 2 2 2" />
          <path d="m14 13 2 2-2 2" />
        </symbol>
        <symbol id="ic-braces" viewBox="0 0 24 24">
          <path d="M8 3H7a2 2 0 0 0-2 2v5a2 2 0 0 1-2 2 2 2 0 0 1 2 2v5a2 2 0 0 0 2 2h1" />
          <path d="M16 21h1a2 2 0 0 0 2-2v-5a2 2 0 0 1 2-2 2 2 0 0 1-2-2V5a2 2 0 0 0-2-2h-1" />
        </symbol>
        <symbol id="ic-config" viewBox="0 0 24 24">
          <path d="M20 7h-9" />
          <path d="M14 17H5" />
          <circle cx="17" cy="17" r="3" />
          <circle cx="7" cy="7" r="3" />
        </symbol>
        <symbol id="ic-script" viewBox="0 0 24 24">
          <path d="m4 17 6-6-6-6" />
          <path d="M12 19h8" />
        </symbol>
        <symbol id="ic-image" viewBox="0 0 24 24">
          <rect width="18" height="18" x="3" y="3" rx="2" />
          <circle cx="9" cy="9" r="2" />
          <path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21" />
        </symbol>
        <symbol id="ic-text" viewBox="0 0 24 24">
          <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
          <path d="M14 2v4a2 2 0 0 0 2 2h4" />
          <path d="M16 13H8" />
          <path d="M16 17H8" />
          <path d="M10 9H8" />
        </symbol>
        <symbol id="ic-file" viewBox="0 0 24 24">
          <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
          <path d="M14 2v4a2 2 0 0 0 2 2h4" />
        </symbol>
      </defs>
    </svg>
    <!-- アプリシェル。中心体験① の最薄ループ（フォルダを開く→ツリー→タブ→編集→保存）を貫通させる骨格。
         ARIA は design doc 17章で全Web再構築する（本スプリントは role の土台のみ）。 -->
    <div id="app">
      <!-- カスタムメニューバー（UIブラッシュアップ T8・差分 A1/A2/A3・ui-mock .menubar）。
           pika は「全Web描画」原則のため OS ネイティブメニューではなく HTML/CSS/TS で実装する。
           ツールバー(#toolbar)は完全廃止し、フォルダを開く/保存/確認済み/巻き戻し等は
           ここの各メニューへ移した。各 .mi クリックで直下に .menu-pop（ドロップダウン）を開く。
           DOM 骨格のみここに置き、ドロップダウンの中身・開閉・キーボード操作は main.ts(ui/menu) が司る。 -->
      <!-- フレームレス化（tauri.conf decorations:false・ui-design §7）でメニュー帯がタイトルバーを兼ねる。
           帯全体を data-tauri-drag-region にしてウィンドウ移動の当たり判定を最大化する。Tauri v2 の
           drag region は mousedown の e.target が data-tauri-drag-region 属性を持つ要素のときだけドラッグを
           開始するため、ボタン（.mi/.wc-btn/tab-tools 内の各 button）には属性を付けず通常クリックを優先する。
           tab-tools/seg など「クリックを受けないラッパ div」には属性を付け、ボタン間の隙間でも移動できるようにする。 -->
      <header
        id="menubar"
        class="menubar"
        role="menubar"
        aria-label="メインメニュー"
        data-tauri-drag-region
      >
        <button
          type="button"
          class="mi"
          id="menu-file"
          role="menuitem"
          aria-haspopup="true"
          aria-expanded="false"
          data-menu="file"
        >
          ファイル
        </button>
        <button
          type="button"
          class="mi"
          id="menu-edit"
          role="menuitem"
          aria-haspopup="true"
          aria-expanded="false"
          data-menu="edit"
        >
          編集
        </button>
        <button
          type="button"
          class="mi"
          id="menu-view"
          role="menuitem"
          aria-haspopup="true"
          aria-expanded="false"
          data-menu="view"
        >
          表示
        </button>
        <button
          type="button"
          class="mi"
          id="menu-go"
          role="menuitem"
          aria-haspopup="true"
          aria-expanded="false"
          data-menu="go"
        >
          移動
        </button>
        <button
          type="button"
          class="mi"
          id="menu-help"
          role="menuitem"
          aria-haspopup="true"
          aria-expanded="false"
          data-menu="help"
        >
          ヘルプ
        </button>
        <!-- メニュー群を左に詰め、右側の tab-tools/window-controls を押し出す伸縮ドラッグ空白。
             #menubar 自体が data-tauri-drag-region のためこの空白もドラッグでウィンドウ移動できる
             （属性は冗長だが当たり判定を明示するため残す）。 -->
        <span class="grow" data-tauri-drag-region></span>
        <!-- 隠れた差分あり（未読）タブ数のバッジ（UIブラッシュアップ T10・差分 C5・要件5.3・
             ui-mock .hidden-unread）。タブが画面幅を超え横スクロールで見えなくなった未読タブが
             あるとき「▸ 未読N」を出す。タブ行（#tabbar）から本メニュー帯へ移設したが id/class は維持し、
             main.ts(updateHiddenUnread) が id 参照で表示/非表示・件数 N・クリックスクロールを司る。
             既定は非表示（hidden）で、N>0 のときだけ出す。 -->
        <button
          id="hidden-unread"
          type="button"
          class="hidden-unread"
          hidden
          title="画面外の差分ありタブへスクロール"
        ></button>
        <!-- タブバー右端から移設したツール群（ui-mock .tab-tools・ui-design 8章）。
             [ソース|分割|プレビュー] のモード切替セグメント（排他）＋ 差分トグル（独立）＋
             ✓確認済みにする＋ブラウザで開く。id/class は維持（main.ts が id 参照で配線）。
             クリックを受けないラッパ（#tab-tools・.seg）には data-tauri-drag-region を付け、ボタン間の
             隙間でもウィンドウ移動できるようにする。各 button 本体には付けない（クリック優先）。 -->
        <div id="tab-tools" data-tauri-drag-region>
          <!-- モード切替セグメント（排他・ui-mock .seg）。現在モードに .on が付く。 -->
          <div class="seg" role="group" aria-label="表示モード" data-tauri-drag-region>
            <button id="mode-source" type="button" data-mode="source" aria-pressed="false">
              ソース
            </button>
            <button id="mode-split" type="button" data-mode="split" aria-pressed="false">
              分割
            </button>
            <button id="mode-preview" type="button" data-mode="preview" aria-pressed="false">
              プレビュー
            </button>
          </div>
          <!-- 差分トグル（独立・ui-mock .diff-toggle）。ON は accent-strong 塗り（.on）。 -->
          <button
            id="toggle-diff"
            type="button"
            class="diff-toggle"
            disabled
            aria-pressed="false"
            title="差分 Ctrl+Shift+D"
          >
            差分
          </button>
          <!-- 確認済みにする（ui-mock .iconbtn・要件8.3）。 -->
          <button
            id="confirm-file"
            type="button"
            class="iconbtn"
            disabled
            title="確認済みにする Ctrl+Enter"
          >
            ✓ 確認済みにする
          </button>
          <!-- ブラウザで開く（ui-mock .iconbtn・要件6.2/design G「UIブラッシュアップ T9」）。
               クリックで**アクティブタブのファイル**を OS 既定アプリ（HTML なら既定ブラウザ等）で開く。
               アクティブタブが無い間は無効（refreshViewTools が活性を同期する）。任意 URL は開かない。 -->
          <button
            id="open-external"
            type="button"
            class="iconbtn"
            disabled
            title="既定のブラウザで開く"
          >
            ブラウザで開く
          </button>
        </div>
        <!-- ウィンドウ操作ボタン群（フレームレス化の自前タイトルバー導線・ui-design §7）。
             OS 標準の最小化/最大化/閉じるを自前実装する。各ボタンの活性/最大化トグルは
             main.ts(initWindowControls) が @tauri-apps/api/window 経由で配線する。
             ボタン自身はドラッグ領域にしない（クリックを受けるため data-tauri-drag-region は付けない）。 -->
        <div id="window-controls" class="window-controls" role="group" aria-label="ウィンドウ操作">
          <button
            type="button"
            id="win-minimize"
            class="wc-btn"
            aria-label="最小化"
            title="最小化"
          >
            <svg viewBox="0 0 10 10" aria-hidden="true"><path d="M0 5h10" /></svg>
          </button>
          <button
            type="button"
            id="win-maximize"
            class="wc-btn"
            aria-label="最大化"
            title="最大化"
          >
            <svg viewBox="0 0 10 10" aria-hidden="true">
              <rect x="0.5" y="0.5" width="9" height="9" />
            </svg>
          </button>
          <button
            type="button"
            id="win-close"
            class="wc-btn wc-close"
            aria-label="閉じる"
            title="閉じる"
          >
            <svg viewBox="0 0 10 10" aria-hidden="true"><path d="M0 0l10 10M10 0L0 10" /></svg>
          </button>
        </div>
      </header>
      <!-- 開いているドロップダウンの実体を載せるレイヤ（メニュー直下に絶対配置する）。
           外側クリック/Esc を拾えるよう #app 直下に置き、ui/menu.ts が menu-pop を出し入れする。 -->
      <div id="menu-layer"></div>
      <div id="workbench">
        <nav id="tree-pane" aria-label="ファイルツリー">
          <!-- ツリーヘッダ（ui-mock .tree-head・ui-design 7章）。「エクスプローラー — <フォルダ名>」を
               左に grow で出し、右端に収納トグル（‹）を置く。フォルダ名は main.ts が更新する。 -->
          <div id="tree-head">
            <span id="tree-head-label" class="grow">エクスプローラー</span>
            <!-- 収納ボタン（‹）。展開時のみ見え、押すとツリーをレールへ収納する（B5）。 -->
            <button
              id="tree-collapse"
              type="button"
              class="tree-toggle"
              aria-label="ツリーを収納"
              aria-expanded="true"
              aria-controls="tree"
              title="ツリーを収納"
            >
              ‹
            </button>
          </div>
          <ul id="tree" role="tree" aria-label="ファイルツリー"></ul>
          <!-- 収納時の引き出しレール（ui-mock .tree-rail）。収納時だけ表示され、押すと展開へ戻す。
               収納してもこのボタンは Tab 到達可能（要件11.5・キーボードで引き出しへ到達できる）。 -->
          <div id="tree-rail">
            <button
              id="tree-expand"
              type="button"
              class="tree-toggle"
              aria-label="ツリーを引き出す"
              aria-expanded="false"
              aria-controls="tree"
              title="ツリーを引き出す"
            >
              ›
            </button>
          </div>
        </nav>
        <main id="editor-pane">
          <!-- タブバー（ui-mock .tabbar・UIブラッシュアップ T6 差分 C4）。grid-row:1 を担うコンテナ。
               tab-tools/hidden-unread はメニュー帯（#menubar）へ移設したため、ここはタブ列（#tabs）のみ。
               #tabs が横幅いっぱいに伸びてタブを並べ、溢れたらホイール上下で横スクロールする（main.ts）。 -->
          <div id="tabbar">
            <div id="tabs" role="tablist" aria-label="開いているタブ"></div>
          </div>
          <!-- 差分トグル ON 時に表示する read-only unified 差分面（要件8.2）。既定は非表示。 -->
          <div id="editor-host" aria-label="エディタ"></div>
          <div id="diff-host" aria-label="差分" hidden></div>
          <!-- プレビュー別WebView の占有領域（要件6.1）。実体は権限ゼロの別WebView/子ウィンドウで、
               ここはその配置先プレースホルダ。HTML 本体は custom protocol が別WebView へ直配信し、
               メインWebView（このページ）の DOM/JS には一切載らない（design doc 6章）。 -->
          <div id="preview-host" aria-label="プレビュー" hidden></div>
          <!-- 通知バー（非モーダル・role=status・要件11.1）。
               エディタ領域（#editor-pane）の **最下段バンド**に置く（content の下）。プレビューは
               ネイティブ子WebView のオーバーレイで #preview-host を覆うため、通知を従来の
               position:absolute でコンテンツ下部中央に出すと子WebView の矩形内に隠れて見えない
               （z-index では解決不可）。バンドへ移すと #preview-host（1fr）はバンドを含まない領域に
               収まり、子WebView が追従してもバンド領域は子WebView の外＝通知が常に手前に見える（要件6.3）。
               通知が無いとき auto 行は 0 高さでプレビューは従来どおりフル高さ（不変）。 -->
          <div id="notifications" role="status" aria-live="polite"></div>
        </main>
      </div>
      <!-- ステータスは右下固定・表示専用（ui-design §9）。pointer-events:none は CSS 側。
           表示専用ゆえ aria-live=off。読み上げが要る差分あり件数は下の sr-live 領域へ announce する。 -->
      <div id="status" aria-live="off"></div>
      <!-- スクリーンリーダー専用のライブ領域（視覚的に隠す）。差分あり件数など、表示専用ステータスでは
           読み上げ到達が弱い情報を polite で announce する（要件11.5・eval medium: aria-label 依存の補強）。 -->
      <div id="sr-live" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
